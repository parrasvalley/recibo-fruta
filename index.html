<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recibo de Fruta - Parras Valley</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>* { box-sizing: border-box; margin: 0; padding: 0; } html, body { height: 100%; background: #020f07; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;


const LINEAS = [
  { id:"persa",   nombre:"Persa",   color:"#22c55e", bg:"#052e16" },
  { id:"slicer",  nombre:"Slicer",  color:"#3b82f6", bg:"#0c1a3a" },
  { id:"europeo", nombre:"Europeo", color:"#a78bfa", bg:"#1e0a3c" },
  { id:"morron",  nombre:"Morron",  color:"#f59e0b", bg:"#2d1600" },
  { id:"minibel", nombre:"Minibel", color:"#f43f5e", bg:"#2d0a14" },
];

// Firebase config
const FB_URL = "https://parrasvalley-default-rtdb.firebaseio.com";

async function storageGet(key){
  try{
    const r = await fetch(FB_URL+"/"+key+".json");
    if(!r.ok) return null;
    const data = await r.json();
    return data;
  }catch(e){
    try{ const v=localStorage.getItem(key); return v?JSON.parse(v):null; }catch(e2){ return null; }
  }
}

async function storageSet(key, value){
  try{
    await fetch(FB_URL+"/"+key+".json", {
      method:"PUT",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(value)
    });
  }catch(e){}
  try{ localStorage.setItem(key, JSON.stringify(value)); }catch(e2){}
}
const STORAGE_KEY = "recibo-v3";
const HIST_KEY = "recibo-hist-v1";
const HORAS_ALARMA = { persa:2, europeo:2, slicer:4, morron:4, minibel:4 };

function horasDesde(iso){
  if(!iso) return 0;
  return (new Date() - new Date(iso)) / 3600000;
}

function initInventario(){
  return LINEAS.reduce((o,l)=>({...o,[l.id]:{recibido:0,pendiente:0,enProceso:0,procesado:0,lotes:[]}}),{});
}

function initForm(lineaId){
  const now = new Date();
  const hora = now.getHours().toString().padStart(2,"0")+":"+now.getMinutes().toString().padStart(2,"0");
  return { lineaId, rancho:"PVT", malla:"", cajas:"", organico:false, chofer:"", horaLlegada:hora, tempLlegada:"", notas:"" };
}

function ModalLote({lin, form, setF, onClose, onGuardar, colorTemp}){
  const inp2 = {width:"100%",border:"1px solid "+lin.color+"44",borderRadius:6,padding:"7px 10px",background:"rgba(0,0,0,0.5)",color:"#f0ece6",fontFamily:"system-ui,sans-serif",fontSize:13,outline:"none"};
  const lbl2 = {fontSize:8,color:"#4a5568",textTransform:"uppercase",letterSpacing:1.5,marginBottom:3};
  const tempVal = parseFloat(form.tempLlegada);
  const tempOk = !isNaN(tempVal);
  const tempColor = tempOk ? colorTemp(tempVal) : "#4a5568";
  const tempBorder = "1px solid "+(tempOk&&tempVal>30?"#ef4444":tempOk&&tempVal>25?"#f59e0b":"#22c55e")+"66";
  const tempLabel = tempOk&&tempVal>30?"FUERA DE RANGO":tempOk&&tempVal>25?"PRECAUCION":"OK";
  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.85)",zIndex:100,display:"flex",alignItems:"flex-end"}}>
      <div style={{background:"#071a10",border:"2px solid "+lin.color+"44",borderRadius:"16px 16px 0 0",padding:"16px 14px 30px",width:"100%",maxWidth:500,margin:"0 auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{fontSize:14,fontWeight:900,color:lin.color}}>Nuevo lote - {lin.nombre}</div>
          <button onClick={onClose} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,padding:"4px 10px",color:"#4a5568",fontSize:11,cursor:"pointer",fontFamily:"system-ui"}}>Cerrar</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:8}}>
          <div><div style={lbl2}>Rancho</div>
            <select style={inp2} value={form.rancho} onChange={e=>setF("rancho",e.target.value)}>
              {["PVT","Cordillera","Forrajera","Otro"].map(r=><option key={r}>{r}</option>)}
            </select>
          </div>
          <div><div style={lbl2}>Malla</div>
            <input style={inp2} placeholder="Ej: 5" value={form.malla} onChange={e=>setF("malla",e.target.value)}/>
          </div>
          <div><div style={lbl2}>Cajas</div>
            <input style={inp2} type="number" placeholder="0" value={form.cajas} onChange={e=>setF("cajas",e.target.value)}/>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
          <div><div style={lbl2}>Tipo</div>
            <select style={inp2} value={form.organico?"org":"conv"} onChange={e=>setF("organico",e.target.value==="org")}>
              <option value="conv">Convencional</option>
              <option value="org">Organico</option>
            </select>
          </div>
          <div><div style={lbl2}>Chofer</div>
            <input style={inp2} placeholder="Nombre del chofer..." value={form.chofer} onChange={e=>setF("chofer",e.target.value)}/>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:12}}>
          <div>
            <div style={lbl2}>Hora llegada</div>
            <input style={inp2} type="time" value={form.horaLlegada} onChange={e=>setF("horaLlegada",e.target.value)}/>
          </div>
          <div>
            <div style={lbl2}>Temp. llegada (C)</div>
            <input style={{...inp2,fontSize:22,fontWeight:900,fontFamily:"Georgia,serif",textAlign:"center",color:tempColor,border:tempBorder}} type="number" step="0.1" placeholder="--" value={form.tempLlegada} onChange={e=>setF("tempLlegada",e.target.value)}/>
            {form.tempLlegada&&<div style={{fontSize:8,color:tempColor,textAlign:"center",marginTop:2,fontWeight:700}}>{tempLabel}</div>}
          </div>
          <div><div style={lbl2}>Notas</div>
            <input style={inp2} placeholder="Observaciones..." value={form.notas} onChange={e=>setF("notas",e.target.value)}/>
          </div>
        </div>

        <button onClick={onGuardar} style={{width:"100%",padding:"12px",background:(form.malla&&form.cajas)?"linear-gradient(135deg,"+lin.color+"99,"+lin.color+")":"rgba(255,255,255,0.04)",border:"none",borderRadius:8,fontFamily:"system-ui,sans-serif",fontSize:13,fontWeight:700,color:(form.malla&&form.cajas)?"#000":"#4a5568",cursor:(form.malla&&form.cajas)?"pointer":"default"}}>
          Registrar lote
        </button>
      </div>
    </div>
  );
}

function App(){
  const [inv, setInv] = useState(initInventario());
  const [loading, setLoading] = useState(true);
  const [vistaLinea, setVistaLinea] = useState(null);
  const [vistaHistorial, setVistaHistorial] = useState(false);
  const [confirmCerrar, setConfirmCerrar] = useState(null);
  const [filtroHist, setFiltroHist] = useState("");
  const [historial, setHistorial] = useState([]);
  const [modalEnviar, setModalEnviar] = useState(null); // {loteId, lineaId}
  const [cajasEnvio, setCajasEnvio] = useState("");
  const [lineaEnvio, setLineaEnvio] = useState("");
  const [modalNuevo, setModalNuevo] = useState(null); // lineaId
  const [form, setForm] = useState(null);
  const [ticker, setTicker] = useState(0);

  const cargar = async () => {
    try {
      const data = await storageGet(STORAGE_KEY);
      if(data && typeof data === 'object') {
        // Asegurar que cada linea tiene la estructura correcta
        const base = initInventario();
        const merged = {};
        LINEAS.forEach(lin => {
          merged[lin.id] = {
            recibido: data[lin.id]?.recibido || 0,
            pendiente: data[lin.id]?.pendiente || 0,
            enProceso: data[lin.id]?.enProceso || 0,
            procesado: data[lin.id]?.procesado || 0,
            lotes: data[lin.id]?.lotes || [],
          };
        });
        setInv(merged);
      } else {
        setInv(initInventario());
      }
    } catch(e) {
      setInv(initInventario());
    }
    try{ const h=localStorage.getItem(HIST_KEY); if(h) setHistorial(JSON.parse(h)); }catch(e){}
    setLoading(false);
  };

  const guardar = async (nuevo) => {
    setInv(nuevo);
    await storageSet(STORAGE_KEY, nuevo);
  };

  useEffect(()=>{ cargar(); },[]);

  const setF = (k,v) => setForm(f=>({...f,[k]:v}));

  // Registrar nuevo lote de recibo
  const registrarLote = async () => {
    if(!form.malla||!form.cajas) return;
    const cajas = parseInt(form.cajas);
    const lote = {
      id: Date.now(), ...form, cajas,
      pendiente: cajas, enProceso: 0, procesado: 0,
      tempLlegada: form.tempLlegada ? parseFloat(form.tempLlegada) : null,
      fechaHora: new Date().toISOString(),
    };
    const nueva = {...inv};
    nueva[form.lineaId] = {
      ...nueva[form.lineaId],
      recibido: nueva[form.lineaId].recibido + cajas,
      pendiente: nueva[form.lineaId].pendiente + cajas,
      lotes: [lote, ...nueva[form.lineaId].lotes],
    };
    await guardar(nueva);
    setModalNuevo(null);
    setForm(null);
  };

  // Enviar cajas de un lote a proceso
  const enviarCajas = async () => {
    const n = parseInt(cajasEnvio);
    if(!n||n<=0||!modalEnviar) return;
    const {loteId, lineaId} = modalEnviar;
    const nueva = {...inv};
    const linea = {...nueva[lineaId]};
    const lotes = linea.lotes.map(l=>{
      if(l.id!==loteId) return l;
      const enviar = Math.min(n, l.pendiente);
      const now = new Date();
      const horaInicio = now.getHours().toString().padStart(2,"0")+":"+now.getMinutes().toString().padStart(2,"0");
      return {...l, pendiente: l.pendiente-enviar, enProceso: l.enProceso+enviar, lineaProceso: lineaEnvio||l.lineaProceso||"", horaInicioProceso: l.horaInicioProceso||horaInicio};
    });
    const enviar = Math.min(n, linea.lotes.find(l=>l.id===loteId)?.pendiente||0);
    linea.lotes = lotes;
    linea.pendiente = Math.max(0, linea.pendiente - enviar);
    linea.enProceso = linea.enProceso + enviar;
    nueva[lineaId] = linea;
    await guardar(nueva);
    setModalEnviar(null);
    setCajasEnvio("");
    setLineaEnvio("");
  };

  // Marcar cajas en proceso como procesadas
  const terminarProceso = async (loteId, lineaId) => {
    const nueva = {...inv};
    const linea = {...nueva[lineaId]};
    const lote = linea.lotes.find(l=>l.id===loteId);
    if(!lote||lote.enProceso<=0) return;
    const terminar = lote.enProceso;
    linea.lotes = linea.lotes.map(l=>l.id===loteId?{...l,enProceso:0,procesado:l.procesado+terminar}:l);
    linea.enProceso = Math.max(0, linea.enProceso - terminar);
    linea.procesado = linea.procesado + terminar;
    nueva[lineaId] = linea;
    await guardar(nueva);
  };

  const colorTemp = t => {
    if(t===null||t===undefined) return "#4a5568";
    if(t>30) return "#ef4444";
    if(t>25) return "#f59e0b";
    return "#22c55e";
  };

  if(loading) return (
    <div style={{background:"#020f07",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}}>
      <div style={{fontSize:40}}></div>
      <div style={{color:"#22c55e",fontFamily:"monospace",fontSize:14,letterSpacing:2}}>Cargando...</div>
    </div>
  );

  // -- DETALLE DE LINEA ------------------------------------------------------
  if(vistaLinea){
    const lin = LINEAS.find(l=>l.id===vistaLinea);
    const datos = inv[vistaLinea];
    return (
      <div style={{background:"#020f07",minHeight:"100vh",color:"#e2ddd6",fontFamily:"system-ui,sans-serif"}}>
      <div style={{maxWidth:500,margin:"0 auto",padding:"10px 12px 60px"}}>

        {/* Header detalle */}
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,borderBottom:"1px solid rgba(255,255,255,0.07)",paddingBottom:10}}>
          <button onClick={()=>setVistaLinea(null)} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,padding:"5px 10px",color:"#94a3b8",fontSize:11,cursor:"pointer",fontFamily:"system-ui"}}>Volver</button>
          <div style={{fontSize:"clamp(13px, 1.5vw, 20px)",fontWeight:900,color:lin.color}}>{lin.nombre}</div>
          <div style={{display:"flex",gap:5,marginLeft:"auto"}}>
            <button onClick={()=>{setModalNuevo(vistaLinea);setForm(initForm(vistaLinea));}} style={{background:lin.color+"22",border:"1px solid "+lin.color+"66",borderRadius:6,padding:"5px 10px",color:lin.color,fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"system-ui"}}>+ Lote</button>
            <button onClick={()=>setConfirmCerrar(vistaLinea)} style={{background:"rgba(239,68,68,0.12)",border:"1px solid rgba(239,68,68,0.4)",borderRadius:6,padding:"5px 10px",color:"#ef4444",fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"system-ui"}}>Cerrar dia</button>
          </div>
        </div>

        {/* Mini resumen */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:5,marginBottom:14}}>
          {[["Recibido",datos.recibido,"#94a3b8"],["Pendiente",datos.pendiente,"#f59e0b"],["En proceso",datos.enProceso,"#3b82f6"],["Procesado",datos.procesado,"#22c55e"]].map(([lb,val,col])=>(
            <div key={lb} style={{background:col+"15",border:"1px solid "+col+"33",borderRadius:8,padding:"8px 5px",textAlign:"center"}}>
              <div style={{fontSize:22,fontWeight:900,color:col,fontFamily:"Georgia,serif"}}>{val}</div>
              <div style={{fontSize:7,color:col,textTransform:"uppercase",letterSpacing:1}}>{lb}</div>
            </div>
          ))}
        </div>

        {/* Lotes */}
        {!datos.lotes.length
          ? <div style={{textAlign:"center",padding:40,color:"#4a5568"}}>Sin lotes registrados</div>
          : datos.lotes.map(lote=>{
            const horas = horasDesde(lote.fechaHora);
            const limiteHoras = HORAS_ALARMA[vistaLinea]||4;
            const alarma = horas>=limiteHoras && lote.pendiente>0;
            return (
              <div key={lote.id} style={{background:"rgba(0,0,0,0.4)",border:"2px solid "+(alarma?"#ef4444":lin.color+"44"),borderRadius:10,padding:"10px 12px",marginBottom:10}}>
                {alarma&&<div style={{background:"rgba(239,68,68,0.12)",border:"1px solid #ef4444",borderRadius:5,padding:"3px 8px",marginBottom:6,fontSize:9,color:"#ef4444",fontWeight:700}}>ALERTA - {Math.floor(horas)}h en espera</div>}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                  <div>
                    <div style={{fontSize:12,fontWeight:700,color:"#f0ece6"}}>{lote.rancho} . Malla {lote.malla}</div>
                    <div style={{fontSize:9,color:"#4a5568"}}>Chofer: {lote.chofer||"N/D"} . {lote.organico?"Organico":"Convencional"}</div>
                    <div style={{fontSize:9,color:"#4a5568"}}>Llegada: <span style={{color:"#f0ece6",fontWeight:700}}>{lote.horaLlegada||"N/D"}</span> . Linea: <span style={{color:"#a78bfa",fontWeight:700}}>{lote.lineaProceso||"No especificada"}</span></div>
                    {lote.horaInicioProceso&&<div style={{fontSize:9,color:"#4a5568"}}>Inicio proceso: <span style={{color:"#22c55e",fontWeight:700}}>{lote.horaInicioProceso}</span></div>}
                  </div>
                  {lote.tempLlegada!==null&&lote.tempLlegada!==undefined&&(
                    <div style={{fontSize:13,fontWeight:700,color:colorTemp(lote.tempLlegada)}}>{lote.tempLlegada}C</div>
                  )}
                </div>

                {/* Cajas del lote */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:4,marginBottom:8}}>
                  {[["Total",lote.cajas,"#94a3b8"],["Pendiente",lote.pendiente,"#f59e0b"],["Proceso",lote.enProceso,"#3b82f6"],["Listo",lote.procesado,"#22c55e"]].map(([lb,val,col])=>(
                    <div key={lb} style={{background:col+"15",border:"1px solid "+col+"33",borderRadius:6,padding:"5px",textAlign:"center"}}>
                      <div style={{fontSize:18,fontWeight:900,color:col,fontFamily:"Georgia,serif"}}>{val}</div>
                      <div style={{fontSize:7,color:col,textTransform:"uppercase"}}>{lb}</div>
                    </div>
                  ))}
                </div>

                {/* Botones */}
                <div style={{display:"flex",gap:5}}>
                  {lote.pendiente>0&&(
                    modalEnviar&&modalEnviar.loteId===lote.id ? (
                      <div style={{display:"flex",flexDirection:"column",gap:5,flex:1}}>
                        <div style={{display:"flex",gap:4,alignItems:"center"}}>
                          <input type="number" placeholder="Cajas" value={cajasEnvio} onChange={e=>setCajasEnvio(e.target.value)} autoFocus
                            style={{flex:1,border:"1px solid "+lin.color+"66",borderRadius:6,padding:"6px 8px",background:"rgba(0,0,0,0.4)",color:"#f0ece6",fontFamily:"system-ui",fontSize:13,outline:"none"}}/>
                          <button onClick={()=>{setModalEnviar(null);setCajasEnvio("");setLineaEnvio("");}} style={{padding:"6px 8px",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,color:"#4a5568",fontSize:10,cursor:"pointer",fontFamily:"system-ui"}}>X</button>
                        </div>
                        <select value={lineaEnvio} onChange={e=>setLineaEnvio(e.target.value)}
                          style={{width:"100%",border:"1px solid "+lin.color+"44",borderRadius:6,padding:"6px 8px",background:"rgba(0,0,0,0.4)",color:"#f0ece6",fontFamily:"system-ui",fontSize:12,outline:"none"}}>
                          <option value="">-- Linea de proceso --</option>
                          <option value="Linea Persa">Linea Persa</option>
                          <option value="Linea Slicer">Linea Slicer</option>
                          <option value="Linea Europeo">Linea Europeo</option>
                          <option value="Linea Morron">Linea Morron</option>
                          <option value="Linea Minibel">Linea Minibel</option>
                        </select>
                        <button onClick={enviarCajas} style={{width:"100%",padding:"7px",background:lin.color+"22",border:"1px solid "+lin.color+"66",borderRadius:6,color:lin.color,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"system-ui"}}>Confirmar envio</button>
                      </div>
                    ):(
                      <button onClick={()=>setModalEnviar({loteId:lote.id,lineaId:vistaLinea})} style={{flex:1,padding:"7px",background:lin.color+"18",border:"1px solid "+lin.color+"55",borderRadius:6,color:lin.color,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"system-ui"}}>Enviar a linea</button>
                    )
                  )}
                  {lote.enProceso>0&&(
                    <button onClick={()=>terminarProceso(lote.id,vistaLinea)} style={{flex:1,padding:"7px",background:"rgba(34,197,94,0.12)",border:"1px solid rgba(34,197,94,0.4)",borderRadius:6,color:"#22c55e",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"system-ui"}}>Terminado ({lote.enProceso} cajas)</button>
                  )}
                </div>
                {lote.notas&&<div style={{fontSize:9,color:"#4a5568",marginTop:5}}>Nota: {lote.notas}</div>}
              </div>
            );
          })
        }
      </div>

      {confirmCerrar&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.85)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#0f1a12",border:"2px solid rgba(239,68,68,0.4)",borderRadius:12,padding:"20px",maxWidth:300,width:"100%",textAlign:"center"}}>
            <div style={{fontSize:14,fontWeight:900,color:"#f0ece6",marginBottom:8}}>Cerrar dia - {lin.nombre}</div>
            <div style={{fontSize:12,color:"#94a3b8",marginBottom:16}}>Los datos se guardaran en el historial y los contadores regresaran a cero.</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setConfirmCerrar(null)} style={{flex:1,padding:"8px",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,color:"#94a3b8",fontSize:12,cursor:"pointer",fontFamily:"system-ui"}}>Cancelar</button>
              <button onClick={async ()=>{ await cerrarDia(confirmCerrar); setConfirmCerrar(null); setVistaLinea(null); }} style={{flex:1,padding:"8px",background:"rgba(239,68,68,0.2)",border:"1px solid rgba(239,68,68,0.5)",borderRadius:6,color:"#ef4444",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"system-ui"}}>Confirmar</button>
            </div>
          </div>
        </div>
      )}

      </div>
    );
  }


  const cerrarDia = async (lineaId) => {
    const lin = LINEAS.find(l=>l.id===lineaId);
    const datos = inv[lineaId];
    if(!datos.lotes.length) return;

    const ahora = new Date();
    const fecha = ahora.toLocaleDateString("es-MX",{weekday:"short",day:"2-digit",month:"short",year:"numeric"});
    const hora = ahora.getHours().toString().padStart(2,"0")+":"+ahora.getMinutes().toString().padStart(2,"0");

    const alertasDisparadas = datos.lotes.filter(l=>horasDesde(l.fechaHora)>=(HORAS_ALARMA[lineaId]||4)).length;

    const snap = {
      id: Date.now(),
      fecha, horaCierre: hora,
      lineaId, lineaNombre: lin.nombre, lineaColor: lin.color,
      totalLotes: datos.lotes.length,
      totalCajas: datos.lotes.reduce((s,l)=>s+l.cajas,0),
      cajasProcesadas: datos.lotes.reduce((s,l)=>s+l.cajasProcesadas,0),
      alertasDisparadas,
      lotes: datos.lotes.map(l=>({
        rancho: l.rancho, malla: l.malla, cajas: l.cajas,
        organico: l.organico, chofer: l.chofer||"N/D",
        horaLlegada: l.horaLlegada||"N/D",
        horaInicioProceso: l.horaInicioProceso||"N/D",
        tempLlegada: l.tempLlegada,
        lineaProceso: l.lineaProceso||"N/D",
        cajasProcesadas: l.cajasProcesadas,
        notas: l.notas||""
      }))
    };

    const nuevoHist = [snap, ...historial].slice(0,200);
    setHistorial(nuevoHist);
    try{ localStorage.setItem(HIST_KEY, JSON.stringify(nuevoHist)); }catch(e){}

    // Limpiar esa linea
    const nueva = {...inv, [lineaId]: {recibido:0,pendiente:0,enProceso:0,procesado:0,lotes:[]}};
    await guardar(nueva);
  };

  // -- HISTORIAL -------------------------------------------------------------
  if(vistaHistorial){
    const filtrados = historial.filter(h=>
      !filtroHist ||
      h.lineaNombre.toLowerCase().includes(filtroHist.toLowerCase()) ||
      h.fecha.toLowerCase().includes(filtroHist.toLowerCase())
    );
    return (
      <div style={{background:"#020f07",minHeight:"100vh",color:"#e2ddd6",fontFamily:"system-ui,sans-serif"}}>
      <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"radial-gradient(ellipse at 30% 20%, #0a3320 0%, #020f07 50%, #051a10 100%)",zIndex:0,pointerEvents:"none"}}/>
      <div style={{position:"relative",zIndex:1,maxWidth:1200,margin:"0 auto",padding:"clamp(10px, 3vw, 30px)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,borderBottom:"1px solid rgba(255,255,255,0.07)",paddingBottom:10}}>
          <button onClick={()=>setVistaHistorial(false)} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,padding:"5px 10px",color:"#94a3b8",fontSize:11,cursor:"pointer",fontFamily:"system-ui"}}>Volver</button>
          <div style={{fontSize:16,fontWeight:900,color:"#f0ece6"}}>HISTORIAL</div>
          <div style={{fontSize:9,color:"#4a5568",marginLeft:4}}>{historial.length} dias cerrados</div>
        </div>
        <input style={{width:"100%",border:"1px solid rgba(255,255,255,0.12)",borderRadius:6,padding:"7px 10px",background:"rgba(0,0,0,0.3)",color:"#f0ece6",fontFamily:"system-ui",fontSize:13,outline:"none",marginBottom:12}} placeholder="Filtrar por linea o fecha..." value={filtroHist} onChange={e=>setFiltroHist(e.target.value)}/>
        {!filtrados.length
          ? <div style={{textAlign:"center",padding:40,color:"#4a5568"}}>Sin dias cerrados. Usa el boton "Cerrar dia" en cada linea.</div>
          : filtrados.map(h=>(
            <div key={h.id} style={{background:"rgba(0,0,0,0.35)",border:"1px solid "+h.lineaColor+"33",borderRadius:10,padding:"10px 12px",marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div>
                  <span style={{fontSize:14,fontWeight:900,color:h.lineaColor}}>{h.lineaNombre}</span>
                  <span style={{fontSize:9,color:"#4a5568",marginLeft:6}}>Cierre: {h.horaCierre}</span>
                </div>
                <div style={{fontSize:10,color:"#94a3b8"}}>{h.fecha}</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:5,marginBottom:8}}>
                {[["Viajes",h.totalLotes,"#3b82f6"],["Cajas recibidas",h.totalCajas,"#94a3b8"],["Procesadas",h.cajasProcesadas,"#22c55e"]].map(function(x){
                  return (
                    <div key={x[0]} style={{background:x[2]+"12",border:"1px solid "+x[2]+"30",borderRadius:6,padding:"6px",textAlign:"center"}}>
                      <div style={{fontSize:"clamp(18px, 2.5vw, 32px)",fontWeight:900,color:x[2],fontFamily:"Georgia,serif"}}>{x[1]}</div>
                      <div style={{fontSize:"clamp(7px, 1vw, 11px)",color:x[2],textTransform:"uppercase",letterSpacing:1}}>{x[0]}</div>
                    </div>
                  );
                })}
              </div>
              {(h.alertasDisparadas||0)>0&&(
                <div style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:5,padding:"4px 8px",marginBottom:8,fontSize:9,color:"#ef4444",fontWeight:700}}>
                  {h.alertasDisparadas||0} alerta{h.alertasDisparadas>1?"s":""} de tiempo disparada{h.alertasDisparadas>1?"s":""} ese dia
                </div>
              )}
              <div style={{fontSize:9,color:"#4a5568",textTransform:"uppercase",letterSpacing:1,marginBottom:5}}>Viajes del dia</div>
              {h.lotes.map(function(l,i){
                return (
                  <div key={i} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:6,padding:"6px 8px",marginBottom:4}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                      <span style={{fontSize:11,fontWeight:700,color:"#f0ece6"}}>{l.rancho} . M{l.malla} . {l.cajas} cajas</span>
                      <span style={{fontSize:9,color:l.organico?"#22c55e":"#4a5568"}}>{l.organico?"Org":"Conv"}</span>
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:8,fontSize:9,color:"#4a5568"}}>
                      <span>Llegada: <b style={{color:"#f0ece6"}}>{l.horaLlegada}</b></span>
                      <span>Inicio: <b style={{color:"#22c55e"}}>{l.horaInicioProceso}</b></span>
                      {l.tempLlegada!==null&&l.tempLlegada!==undefined&&<span>Temp: <b style={{color:l.tempLlegada>30?"#ef4444":l.tempLlegada>25?"#f59e0b":"#22c55e"}}>{l.tempLlegada}C</b></span>}
                      <span>Linea: <b style={{color:"#a78bfa"}}>{l.lineaProceso}</b></span>
                      <span>Chofer: <b style={{color:"#f0ece6"}}>{l.chofer}</b></span>
                    </div>
                    {l.notas&&<div style={{fontSize:9,color:"#4a5568",marginTop:2}}>Nota: {l.notas}</div>}
                  </div>
                );
              })}
            </div>
          ))
        }
      </div>
      </div>
    );
  }

  // -- TABLERO PRINCIPAL -----------------------------------------------------
  const totalAlertas = LINEAS.reduce((s,l)=>{
    const datos = inv[l.id];
    const lim = HORAS_ALARMA[l.id]||4;
    return s + datos.lotes.filter(lot=>horasDesde(lot.fechaHora)>=lim&&lot.pendiente>0).length;
  },0);

  return (
    <div style={{background:"#020f07",minHeight:"100vh",color:"#e2ddd6",fontFamily:"system-ui,sans-serif"}}>

      {/* Fondo decorativo */}
      <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"radial-gradient(ellipse at 30% 20%, #0a3320 0%, #020f07 50%, #051a10 100%)",zIndex:0,pointerEvents:"none"}}/>

      <div style={{position:"relative",zIndex:1,maxWidth:1200,margin:"0 auto",padding:"clamp(10px, 3vw, 30px)"}}>

        {/* Header */}
        <div style={{textAlign:"center",marginBottom:16,borderBottom:"1px solid rgba(34,197,94,0.15)",paddingBottom:12}}>
          <div style={{fontSize:9,color:"#22c55e",textTransform:"uppercase",letterSpacing:3,marginBottom:2}}>Parras Valley</div>
          <div style={{fontSize:"clamp(16px, 2.5vw, 28px)",fontWeight:900,color:"#f0ece6",letterSpacing:1}}>CONTROL DE RECIBO</div>
          <div style={{fontSize:9,color:"#4a5568",marginTop:2}}>Inventario en tiempo real</div>
          <div style={{display:"flex",gap:6,justifyContent:"center",marginTop:8}}>
            {totalAlertas>0&&<div style={{background:"rgba(239,68,68,0.15)",border:"1px solid rgba(239,68,68,0.4)",borderRadius:20,padding:"3px 10px",fontSize:9,color:"#ef4444",fontWeight:700}}>{totalAlertas} alerta{totalAlertas>1?"s":""} de tiempo</div>}
            <button onClick={()=>setVistaHistorial(true)} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:20,padding:"3px 10px",color:"#94a3b8",fontSize:9,cursor:"pointer",fontFamily:"system-ui"}}>Historial</button>
            <button onClick={cargar} style={{background:"rgba(34,197,94,0.08)",border:"1px solid rgba(34,197,94,0.2)",borderRadius:20,padding:"3px 10px",color:"#22c55e",fontSize:9,cursor:"pointer",fontFamily:"system-ui"}}>Actualizar</button>
          </div>
        </div>

        {/* Tarjetas por linea */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(160px, 1fr))",gap:10}}>
          {LINEAS.map(lin=>{
            const datos = inv[lin.id];
            const limHoras = HORAS_ALARMA[lin.id]||4;
            const alertasLinea = datos.lotes.filter(l=>horasDesde(l.fechaHora)>=limHoras&&l.pendiente>0).length;
            return (
              <div key={lin.id} onClick={()=>setVistaLinea(lin.id)}
                style={{background:"linear-gradient(135deg, "+lin.bg+" 0%, rgba(0,0,0,0.6) 100%)",border:"2px solid "+(alertasLinea>0?"#ef4444":lin.color+"44"),borderRadius:14,padding:"clamp(10px, 2vw, 20px)",cursor:"pointer",transition:"transform 0.1s",position:"relative",overflow:"hidden"}}>

                {/* Decoracion fondo */}
                <div style={{position:"absolute",top:-15,right:-15,fontSize:60,opacity:0.06,transform:"rotate(-15deg)",pointerEvents:"none",userSelect:"none"}}></div>

                {alertasLinea>0&&<div style={{position:"absolute",top:8,right:8,background:"#ef4444",borderRadius:"50%",width:18,height:18,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"#fff",fontWeight:700}}>{alertasLinea}</div>}

                <div style={{fontSize:"clamp(13px, 1.5vw, 20px)",fontWeight:900,color:lin.color,marginBottom:2}}>{lin.nombre}</div>
                

                <div style={{marginBottom:6}}>
                  <div style={{fontSize:9,color:"#4a5568",marginBottom:2}}>Total recibido</div>
                  <div style={{fontSize:"clamp(28px, 4vw, 52px)",fontWeight:900,color:"#f0ece6",fontFamily:"Georgia,serif",lineHeight:1}}>{datos.recibido}</div>
                  <div style={{fontSize:8,color:"#4a5568"}}>cajas</div>
                </div>

                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4}}>
                  {[["Pend.",datos.pendiente,"#f59e0b"],["Proc.",datos.enProceso,"#3b82f6"],["Listo",datos.procesado,"#22c55e"]].map(([lb,val,col])=>(
                    <div key={lb} style={{background:col+"15",borderRadius:5,padding:"4px 3px",textAlign:"center"}}>
                      <div style={{fontSize:15,fontWeight:900,color:col,fontFamily:"Georgia,serif"}}>{val}</div>
                      <div style={{fontSize:6,color:col,textTransform:"uppercase"}}>{lb}</div>
                    </div>
                  ))}
                </div>

                <div style={{marginTop:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:8,color:lin.color+"99"}}>{datos.lotes.length} lote{datos.lotes.length!==1?"s":""}</span><button onClick={e=>{e.stopPropagation();setModalNuevo(lin.id);setForm(initForm(lin.id));}} style={{background:lin.color+"22",border:"1px solid "+lin.color+"66",borderRadius:5,padding:"3px 8px",color:lin.color,fontSize:9,fontWeight:700,cursor:"pointer",fontFamily:"system-ui"}}>+ Nuevo lote</button></div>
              </div>
            );
          })}
        </div>

      </div>


      {modalNuevo&&form&&(
        <ModalLote
          lin={LINEAS.find(l=>l.id===modalNuevo)}
          form={form}
          setF={setF}
          onClose={()=>{setModalNuevo(null);setForm(null);}}
          onGuardar={registrarLote}
          colorTemp={colorTemp}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
